<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platon Ivanchenko | Terminal</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/153730556?v=4">
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #0a0a0a; color: #00ff41; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; 
            position: relative;
        }
        .container { width: 100%; max-width: 500px; text-align: center; }
        .header { margin-bottom: 30px; margin-top: 40px; }
        .profile-img { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 2px solid #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            object-fit: cover; background-color: #000;
        }
        h2 { text-transform: uppercase; letter-spacing: 2px; }
        .controls { margin-bottom: 30px; }
        #search-input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #00ff41; 
            color: #00ff41; border-radius: 4px; font-family: 'Courier New', monospace;
            font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; outline: none;
        }
        .filter-btn {
            background: #000; border: 1px solid #00ff41; padding: 6px 15px; 
            color: #00ff41; border-radius: 0; cursor: pointer; font-size: 0.8rem; 
            margin: 2px; transition: 0.3s; font-family: 'Courier New', monospace;
        }
        .filter-btn:hover, .filter-btn.active { background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; }
        .version-tag {
            position: fixed; bottom: 15px; right: 15px; font-size: 0.7rem;
            color: rgba(0, 255, 65, 0.5); background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px; border: 1px solid #333; pointer-events: none;
        }
        .link-card { 
            background: #000; color: #00ff41; text-decoration: none; 
            padding: 15px 20px; margin-bottom: 15px; border: 1px solid #333; 
            display: flex; align-items: center; text-align: left;
            transition: 0.3s; border-left: 4px solid #00ff41;
        }
        .link-card:hover { transform: scale(1.02); border-color: #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        .icon { 
            font-size: 1.5rem; margin-right: 15px; width: 30px; 
            height: 30px; display: flex; align-items: center; justify-content: center;
        }
        .favicon-img { width: 24px; height: 24px; border-radius: 4px; }
        .link-info { display: flex; flex-direction: column; overflow: hidden; }
        .link-title { font-weight: 600; font-size: 1rem; }
        .link-url { font-size: 0.75rem; color: #008f11; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Right Side Personal Accounts Bar */
        .social-sidebar {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid #00ff41;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            z-index: 1000;
            align-items: center;
        }
        
        /* New Label Style */
        .sidebar-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            margin-bottom: 10px;
            color: rgba(0, 255, 65, 0.7);
            letter-spacing: 2px;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 5px;
            white-space: nowrap;
        }

        .social-sidebar a {
            display: flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; transition: 0.3s; opacity: 0.7;
        }
        .social-sidebar a:hover {
            transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 8px #00ff41);
        }
        .social-sidebar img {
            width: 24px; height: 24px; border-radius: 4px;
        }

        /* Adjust social sidebar for mobile devices */
        @media (max-width: 800px) {
            .social-sidebar {
                position: static;
                flex-direction: row;
                transform: none;
                justify-content: center;
                margin-top: -10px;
                margin-bottom: 20px;
                width: 100%;
                background: none;
                border: none;
                box-shadow: none;
            }
            .sidebar-label {
                writing-mode: horizontal-tb;
                transform: none;
                margin-bottom: 0;
                margin-right: 15px;
                border-bottom: none;
                border-right: 1px solid #00ff41;
                padding-bottom: 0;
                padding-right: 10px;
                display: flex;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <div class="social-sidebar">
        <div class="sidebar-label">PERSONAL_LOGS</div>
        <a href="https://instagram.com/ivanchenkoplaton" title="Instagram" target="_blank">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=instagram.com" alt="Insta">
        </a>
        <a href="https://www.snapchat.com/add/ivanchenkoplat?share_id=I7eU0PXFrIY&locale=de-DE" title="Snapchat" target="_blank">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=snapchat.com" alt="Snap">
        </a>
        <a href="https://t.me/ivanchenkoplaton" title="Telegram" target="_blank">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=t.me" alt="TG">
        </a>
        <a href="https://github.com/ivanchenkoplaton" title="GitHub" target="_blank">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=github.com" alt="GH">
        </a>
        <a href="https://discord.gg/Y3y85FMq" title="Discord" target="_blank">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=discord.com" alt="DC">
        </a>
        <a href="mailto:pton882288@gmail.com" title="Email">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=mail.google.com" alt="Mail">
        </a>
        <a href="https://steamcommunity.com/id/platononsteam/" title="Steam" target="_blank">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=steamcommunity.com" alt="Steam">
        </a>
    </div>

    <div class="container">
        <div class="header">
            <img src="https://avatars.githubusercontent.com/u/153730556?v=4" alt="Platon Ivanchenko" class="profile-img">
            <h2>> Platon Ivanchenko</h2>
        </div>
        <div class="controls">
            <input type="text" id="search-input" placeholder="[QUERY_SYSTEM]: Search links...">
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
                <button class="filter-btn active" onclick="filterLinks('all', this)">ALL_LOGS</button>
                <button class="filter-btn" onclick="filterLinks('dev', this)">DEV</button>
                <button class="filter-btn" onclick="filterLinks('ai', this)">AI</button>
                <button class="filter-btn" onclick="filterLinks('storage', this)">STORAGE</button>
                <button class="filter-btn" onclick="filterLinks('media', this)">MEDIA</button>
                <button class="filter-btn" onclick="filterLinks('shop', this)">SHOP</button>
                <button class="filter-btn" onclick="filterLinks('edu', this)">EDU</button>
                <button class="filter-btn" onclick="filterLinks('util', this)">UTIL</button>
            </div>
        </div>
        <div id="link-container">Initializing system...</div>
    </div>
    <div class="version-tag">SYS_VER: 1.1.2</div>

    <script>
        let allLinks = [];

        function fetchLinks() {
            fetch('./links.csv?t=' + new Date().getTime())
            .then(res => res.text())
            .then(csv => {
                const rows = csv.trim().split('\n');
                allLinks = rows.slice(1).map(r => {
                    const c = r.split(',');
                    return { title: c[0].trim(), url: c[1].trim(), type: c[2]?.trim().toLowerCase() || "web" };
                });
                renderLinks(allLinks);
            });
        }

        function renderLinks(links) {
            const container = document.getElementById("link-container");
            container.innerHTML = ""; 
            links.forEach(l => {
                let iconContent;
                
                if (l.type === 'storage') {
                    iconContent = "☁️";
                } else if (l.type === 'util') {
                    iconContent = "📅"; // Event Calendar
                } else {
                    const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(l.url, window.location.href).hostname}`;
                    iconContent = `<img src="${faviconUrl}" class="favicon-img" onerror="this.parentElement.innerHTML='🌐'">`;
                }

                container.innerHTML += `
                    <a href="${l.url}" class="link-card">
                        <span class="icon">${iconContent}</span>
                        <div class="link-info">
                            <span class="link-title">${l.title}</span>
                            <span class="link-url">${l.url}</span>
                        </div>
                    </a>`;
            });
        }

        function filterLinks(t, b) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            renderLinks(t === 'all' ? allLinks : allLinks.filter(l => l.type === t));
        }

        // Search Bar Functionality
        document.getElementById('search-input').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            const activeType = document.querySelector('.filter-btn.active').innerText.toLowerCase();
            
            let filtered = allLinks.filter(l => l.title.toLowerCase().includes(query) || l.url.toLowerCase().includes(query));
            
            if (activeType !== 'all_logs') {
                const typeMap = { 'dev': 'dev', 'ai': 'ai', 'storage': 'storage', 'media': 'media', 'shop': 'shop', 'edu': 'edu', 'util': 'util' };
                filtered = filtered.filter(l => l.type === typeMap[activeType]);
            }
            
            renderLinks(filtered);
        });
        
        fetchLinks();
    </script>
</body>
</html>
