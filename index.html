<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platon Ivanchenko</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/153730556?v=4">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #1a1a1a;
            --text-color: #aaaaaa;
            --text-light: #ffffff;
            --border-color: #333333;
            --font-main: 'Courier New', Courier, monospace;
        }
        body { 
            font-family: var(--font-main); 
            background: var(--bg-color); color: var(--text-color); 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; 
            position: relative;
        }
    .container { width: 100%; max-width: 800px; text-align: center; padding-right: 220px; box-sizing: border-box; } /* Yield space for the right panel */
    .header { 
        display: flex; flex-direction: row; align-items: center; justify-content: flex-start; gap: 10px;
        border-bottom: 1px solid var(--text-color); padding-bottom: 10px; margin-bottom: 10px; width: 100%;
    }
        .profile-img { 
        width: 40px; height: 40px; border-radius: 0; 
            border: 1px solid var(--text-color); box-shadow: 2px 2px 0 var(--text-color);
            object-fit: cover; background-color: var(--panel-bg);
        }
    h2 { text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; margin: 0; text-align: left; word-break: break-word; }
    .controls { margin-bottom: 30px; margin-top: 20px; }
        #search-input {
            width: 100%; padding: 12px; background: var(--panel-bg); border: 1px solid var(--text-color); 
            color: var(--text-light); border-radius: 0; font-family: var(--font-main);
            font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; outline: none;
            transition: all 0.3s ease;
        }
        #search-input:focus {
            transform: translate(-2px, -2px);
        }
        #link-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            text-align: left;
        }
        .category-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
            width: 100%;
            text-align: left;
            margin-bottom: -10px;
        }
        .version-tag {
            position: fixed; bottom: 15px; right: 15px; font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5); background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px; border: 1px solid var(--border-color); pointer-events: none;
            z-index: 1000;
        }
        .link-card { 
            background: var(--panel-bg); color: var(--text-light); text-decoration: none; 
            padding: 15px 20px; border: 1px solid var(--border-color); 
            display: flex; align-items: center; text-align: left;
            transition: all 0.3s ease; border-left: 4px solid var(--text-color);
            border-radius: 0;
        }
        .link-card:hover { transform: translate(-2px, -2px); border-color: var(--text-color); }
        .shortcut-tag {
            background: var(--text-color);
            color: var(--bg-color);
            padding: 2px 6px;
            font-size: 0.65rem;
            font-weight: bold;
            margin-left: auto;
            text-transform: uppercase;
        }
        .icon { 
            font-size: 1.5rem; margin-right: 15px; width: 30px; 
            height: 30px; display: flex; align-items: center; justify-content: center;
        }
        .favicon-img { width: 24px; height: 24px; border-radius: 0; }
        .link-info { display: flex; flex-direction: column; overflow: hidden; }
        .link-title { font-weight: 600; font-size: 1rem; }
        .link-url { font-size: 0.75rem; color: var(--text-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.8; }

        /* App Sections and Categories */
        .apps-section {
            margin-top: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .app-category {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .app-category-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 5px;
            width: 100%;
            text-align: center;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }
        .app-icon-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            width: 100%;
            height: 50px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            padding: 0 15px;
            box-sizing: border-box;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            gap: 12px;
        }
        .app-icon-card:hover {
            transform: translateY(-3px);
            border-color: var(--text-color);
            box-shadow: 2px 2px 0 var(--text-color);
        }
        .app-icon-card img { width: 22px; height: 22px; }
        .app-name {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
            letter-spacing: 0.5px;
        }

        /* Right Side Personal Accounts Bar */
        .social-sidebar {
            position: fixed;
            right: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--panel-bg);
        padding: 15px;
            border: 1px solid var(--text-color);
            border-radius: 0;
        box-shadow: 4px 4px 0 var(--text-color);
            z-index: 1000;
        align-items: flex-start;
        min-width: 180px;
        }
        
        /* New Label Style */
        .sidebar-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 3px;
            white-space: nowrap;
        }

    .social-icons-list {
            display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        margin-top: 5px;
        }

        .social-sidebar a {
        display: flex; align-items: center; justify-content: flex-start;
        gap: 12px; transition: 0.3s; opacity: 0.7;
        text-decoration: none; color: var(--text-light);
        font-size: 0.85rem; font-weight: bold;
        }
        .social-sidebar a:hover {
        transform: translate(-3px, -3px); opacity: 1;
        }
        .social-sidebar img {
        width: 28px; height: 28px; border-radius: 0;
    }
    .social-sidebar img.rounded-icon {
        border-radius: 8px;
        }

        /* Adjust social sidebar for mobile devices */
        @media (max-width: 800px) {
        .container { padding-right: 0; }
            .link-grid { grid-template-columns: 1fr; }
            .apps-grid { grid-template-columns: repeat(2, 1fr); }
            .social-sidebar {
                position: static;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                margin-top: 0;
                margin-bottom: 20px;
                width: 100%;
                max-width: 100%;
                background: none;
                border: none;
                box-shadow: none;
            }
            .social-icons-list {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .header {
                border-bottom: none;
                padding-bottom: 5px;
                margin-bottom: 5px;
                justify-content: center;
            }
            .sidebar-label {
            margin: 10px 0;
            }
        }
    </style>
</head>
<body>

    <div class="social-sidebar">
        <div class="header">
            <img src="https://avatars.githubusercontent.com/u/153730556?v=4" alt="Platon Ivanchenko" class="profile-img">

        </div>
        <div class="sidebar-label">PERSONAL_LOGS</div>
        <div class="social-icons-list">
        <a href="https://instagram.com/ivanchenkoplaton" title="Instagram" target="_blank">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=instagram.com" alt="Insta">

        </a>
        <a href="https://t.me/ivanchenkoplaton" title="Telegram" target="_blank">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=t.me" alt="TG" class="rounded-icon">

        </a>
        <a href="https://github.com/ivanchenkoplaton" title="GitHub" target="_blank">

        </a>
        <a href="https://discord.gg/Y3y85FMq" title="Discord" target="_blank">

        <a href="mailto:pton882288@gmail.com" title="Email">

        <a href="https://steamcommunity.com/id/platononsteam/" title="Steam" target="_blank">

        </div>
    </div>

    <div class="container">
        <div class="controls">
            <input type="text" id="search-input" placeholder="[QUERY_SYSTEM]: Type shortcut & press Enter...">
        </div>
        <div id="link-container">Initializing system...</div>
        <div id="apps-container" class="apps-section"></div>
    </div>
    <div class="version-tag" id="sys-version">SYS_VER: Alpha_1.2</div>

    <script>
        let allLinks = [
            { title: 'Gemini', url: 'https://gemini.google.com', shortcut: 'gem', isTop: true },
            { title: 'Perplexity', url: 'https://www.perplexity.ai', shortcut: 'prp', isTop: true },
            { title: 'GitHub', url: 'https://github.com', shortcut: 'gh', isTop: true },
            { title: 'CS50x 2026', url: 'https://cs50.harvard.edu/x/2026', shortcut: 'cs', isTop: true },
            { title: 'OneDrive', url: 'https://onedrive.live.com', shortcut: 'od', isApp: true, vendor: 'microsoft' },
            { title: 'GoFile', url: 'https://gofile.io', shortcut: 'gf' },
            { title: 'YouTube Music', url: 'https://music.youtube.com', shortcut: 'ym' },
            { title: 'Steam', url: 'https://store.steampowered.com', shortcut: 'st', isTop: true },
            { title: 'Event Calendar', url: 'calendar.html', shortcut: 'cal' },
            { title: 'Gmail', url: 'https://mail.google.com', shortcut: 'gm', isApp: true, vendor: 'google' },
            { title: 'YouTube', url: 'https://www.youtube.com', shortcut: 'yt', isApp: true, vendor: 'google' },
            { title: 'Outlook', url: 'https://outlook.live.com', shortcut: 'out', isApp: true, vendor: 'microsoft' },
            { title: 'Google Drive', url: 'https://drive.google.com', shortcut: 'gd', isApp: true, vendor: 'google' },
            { title: 'Google Docs', url: 'https://docs.google.com', shortcut: 'doc', isApp: true, vendor: 'google' },
            { title: 'Google Sheets', url: 'https://docs.google.com/spreadsheets', shortcut: 'sht', isApp: true, vendor: 'google' },
            { title: 'Google Slides', url: 'https://docs.google.com/presentation', shortcut: 'sld', isApp: true, vendor: 'google' },
            { title: 'Microsoft Word', url: 'https://www.office.com/launch/word', shortcut: 'mwd', isApp: true, vendor: 'microsoft' },
            { title: 'Microsoft Excel', url: 'https://www.office.com/launch/excel', shortcut: 'mxl', isApp: true, vendor: 'microsoft' },
            { title: 'Microsoft PowerPoint', url: 'https://www.office.com/launch/powerpoint', shortcut: 'mpt', isApp: true, vendor: 'microsoft' },
            { title: 'Microsoft Teams', url: 'https://teams.microsoft.com', shortcut: 'tm', isApp: true, vendor: 'microsoft' }
        ];

        function updateView() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = allLinks.filter(l => {
                return l.title.toLowerCase().includes(query) || 
                       l.url.toLowerCase().includes(query) ||
                       l.shortcut.includes(query);
            });
            renderLinks(filtered);
        }

        function renderLinks(links) {
            const container = document.getElementById("link-container");
            const appsContainer = document.getElementById("apps-container");
            
            if (links.length === 0) {
                container.innerHTML = "<p>[SYSTEM]: No records match current parameters.</p>";
                if (appsContainer) appsContainer.innerHTML = "";
                return;
            }
            
            const standardLinks = links.filter(l => !l.isApp);
            const appLinks = links.filter(l => l.isApp);
            
            if (appsContainer) {
                if (appLinks.length > 0) {
                    const googleApps = appLinks.filter(l => l.vendor === 'google');
                    const msApps = appLinks.filter(l => l.vendor === 'microsoft');
                    
                    const renderAppGroup = (apps, title) => {
                        if (apps.length === 0) return '';
                        const icons = apps.map(l => {
                            let faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(l.url, window.location.href).hostname}`;
                            let shortName = l.title.replace('Google ', '').replace('Microsoft ', '');
                            return `<a href="${l.url}" class="app-icon-card" title="${l.title} [${l.shortcut}]">
                                        <img src="${faviconUrl}" alt="${l.title}" onerror="this.outerHTML='🌐'">
                                        <span class="app-name">${shortName}</span>
                                    </a>`;
                        }).join('');
                        return `<div class="app-category"><div class="app-category-title">${title}</div><div class="apps-grid">${icons}</div></div>`;
                    };
                    
                    appsContainer.innerHTML = renderAppGroup(googleApps, 'GOOGLE_WORKSPACE') + renderAppGroup(msApps, 'MICROSOFT_365');
                } else {
                    appsContainer.innerHTML = '';
                }
            }
            
            const renderCards = (linksArray) => {
                return linksArray.map(l => {
                    let iconContent = "🌐";
                    if (l.shortcut === 'cal') {
                        iconContent = "📅";
                    } else if (l.url !== '#') {
                        try {
                            const faviconUrl = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(l.url, window.location.href).hostname}`;
                            iconContent = `<img src="${faviconUrl}" class="favicon-img" onerror="this.outerHTML='🌐'">`;
                        } catch(e) {}
                    }

                    return `
                        <a href="${l.url}" class="link-card">
                            <span class="icon">${iconContent}</span>
                            <div class="link-info">
                                <span class="link-title">${l.title}</span>
                                <span class="link-url">${l.url}</span>
                            </div>
                            <span class="shortcut-tag">${l.shortcut}</span>
                        </a>`;
                }).join('');
            };

            const topLinks = standardLinks.filter(l => l.isTop);
            const otherLinks = standardLinks.filter(l => !l.isTop);
            
            let htmlOut = '';
            if (topLinks.length > 0) {
                htmlOut += `<div class="category-header">FREQUENT_ACCESS</div>`;
                htmlOut += `<div class="link-grid">${renderCards(topLinks)}</div>`;
            }
            if (otherLinks.length > 0) {
                if (topLinks.length > 0) htmlOut += `<div class="category-header" style="margin-top: 15px;">STANDARD_MODULES</div>`;
                else htmlOut += `<div class="category-header">STANDARD_MODULES</div>`;
                htmlOut += `<div class="link-grid">${renderCards(otherLinks)}</div>`;
            }
            container.innerHTML = htmlOut;
        }

        // Real-time Search Processing
        document.getElementById('search-input').addEventListener('input', updateView);
        
        // Enter key shortcut execution
        document.getElementById('search-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.toLowerCase().trim();
                const match = allLinks.find(l => l.shortcut === query);
                if (match) window.location.href = match.url;
            }
        });

        // Handle direct ?shortcut or #shortcut routing from the URL
        const directParam = window.location.search.substring(1) || window.location.hash.substring(1);
        if (directParam) {
            const match = allLinks.find(l => l.shortcut === directParam.toLowerCase());
            if (match) window.location.replace(match.url);
        }

        // Fetch latest commit hash for versioning dynamically
        fetch('https://api.github.com/repos/ivanchenkoplaton/ivanchenkoplaton.github.io/commits?per_page=1', { cache: 'no-store' })
            .then(res => res.json())
            .then(data => {
                if (data && data.length > 0 && data[0].sha) {
                    const hash = data[0].sha.substring(0, 7);
                    document.getElementById('sys-version').innerText = `SYS_VER: Alpha_1.2 | build-${hash}`;
                }
            })
            .catch(err => console.log('Version fetch failed:', err));

        updateView();
    </script>
</body>
