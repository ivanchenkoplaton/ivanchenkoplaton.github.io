<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platon Ivanchenko</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        .header { margin-bottom: 30px; margin-top: 40px; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #007bff; object-fit: cover; }

        .link-card { 
            background: white; color: #333; text-decoration: none; 
            padding: 15px 20px; margin-bottom: 12px; border-radius: 10px; 
            display: flex; align-items: center; text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; border-left: 5px solid transparent;
        }
        .link-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 5px solid #007bff; }
        
        .icon { font-size: 1.5rem; margin-right: 15px; width: 30px; text-align: center; }
        .link-info { display: flex; flex-direction: column; overflow: hidden; }
        .link-title { font-weight: 600; font-size: 1rem; }
        .link-url { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .type-file { border-left-color: #28a745; } /* Green for files */
        .type-video { border-left-color: #dc3545; } /* Red for videos */
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://via.placeholder.com/150" alt="Profile" class="profile-img">
            <h2>My Links</h2>
        </div>

        <div id="link-container">Loading...</div>
    </div>

    <script>
        // Load the local CSV file
        // We add a timestamp (?t=...) to prevent the browser from using old cached versions
        fetch('./links.csv?t=' + new Date().getTime())
        .then(response => response.text())
        .then(csvText => {
            const container = document.getElementById("link-container");
            container.innerHTML = ""; 
            
            const rows = csvText.trim().split('\n');
            
            rows.forEach((row, index) => {
                if (index === 0) return; // Skip Header
                if (!row.trim()) return; 

                // CSV Parsing
                const cols = row.split(',');
                const title = cols[0].trim();
                const url = cols[1].trim();
                const type = cols[2] ? cols[2].trim().toLowerCase() : "web";

                // Icons & Styling
                let icon = "🔗";
                let extraClass = "";

                if(type === 'file') { icon = "📂"; extraClass = "type-file"; }
                if(type === 'video') { icon = "🎬"; extraClass = "type-video"; }
                if(type === 'image') { icon = "🖼️"; extraClass = "type-file"; }

                const html = `
                    <a href="${url}" class="link-card ${extraClass}" target="_blank">
                        <span class="icon">${icon}</span>
                        <div class="link-info">
                            <span class="link-title">${title}</span>
                            <span class="link-url">${url}</span>
                        </div>
                    </a>
                `;
                container.innerHTML += html;
            });
        })
        .catch(err => {
            document.getElementById("link-container").innerHTML = "Error loading links.csv";
            console.error(err);
        });
    </script>
</body>
</html>
