<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Protected Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 450px; text-align: center; }

        /* Login Screen */
        #login-screen { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 50px; }
        input[type="password"] { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 70%; margin-bottom: 15px; }
        button { padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .error { color: red; display: none; margin-top: 10px; }

        /* Main Content */
        #protected-content { display: none; width: 100%; }
        .header { margin-bottom: 30px; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #007bff; object-fit: cover; }

        /* Link Cards */
        .link-card { 
            background: white; color: #333; text-decoration: none; 
            padding: 18px; margin-bottom: 12px; border-radius: 10px; 
            display: flex; align-items: center; text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; 
        }
        .link-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: #007bff; }
        .icon { font-size: 1.5rem; margin-right: 15px; }
        .link-info { display: flex; flex-direction: column; }
        .link-title { font-weight: 600; font-size: 1rem; }
        .link-url { font-size: 0.75rem; color: #888; }

        /* THE ADD BUTTON */
        .add-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: #28a745; color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            text-decoration: none; transition: transform 0.2s;
        }
        .add-btn:hover { transform: scale(1.1); background: #218838; }
        .tooltip { position: absolute; right: 70px; background: #333; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 12px; display: none; width: max-content; }
        .add-btn:hover .tooltip { display: block; }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>🔒 Restricted</h2>
        <p>Enter password to unlock.</p>
        <input type="password" id="passwordInput" placeholder="Password">
        <br>
        <button onclick="checkPassword()">Unlock</button>
        <p class="error" id="errorMessage">Wrong password</p>
    </div>

    <div id="protected-content" class="container">
        <div class="header">
            <img src="https://via.placeholder.com/150" alt="Me" class="profile-img">
            <h2>My Links</h2>
        </div>

        <div id="link-container">Loading...</div>

        <a href="#" id="github-edit-btn" class="add-btn" target="_blank">
            +
            <div class="tooltip">Edit Links CSV</div>
        </a>
    </div>

    <script>
        // === CONFIGURATION ===
        const myPassword = "123"; 
        
        // IMPORTANT: REPLACE THIS with your actual GitHub CSV Edit URL
        // Format: https://github.com/USERNAME/REPOSITORY/edit/main/links.csv
        const githubEditUrl = "https://github.com/YOUR_USERNAME/YOUR_REPO_NAME/edit/main/links.csv";
        // =====================

        // Set the button link immediately
        document.getElementById("github-edit-btn").href = githubEditUrl;

        function checkPassword() {
            if (document.getElementById("passwordInput").value === myPassword) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("protected-content").style.display = "block";
                loadLinks();
            } else {
                document.getElementById("errorMessage").style.display = "block";
            }
        }

        function loadLinks() {
            // Fetch the local CSV file
            fetch('./links.csv?t=' + new Date().getTime()) // Timestamp prevents caching
            .then(response => response.text())
            .then(csvText => {
                const rows = csvText.split('\n');
                const container = document.getElementById("link-container");
                container.innerHTML = ""; 

                rows.forEach((row, index) => {
                    if (index === 0) return; // Skip Header Row
                    if (!row.trim()) return; // Skip empty rows

                    const cols = row.split(',');
                    // CSV Columns: 0=Title, 1=Url, 2=Type
                    const title = cols[0].trim();
                    const url = cols[1].trim();
                    const type = cols[2] ? cols[2].trim() : "web";

                    let icon = "🔗";
                    if(type.includes('file')) icon = "📂";
                    if(type.includes('video')) icon = "🎬";

                    const html = `
                        <a href="${url}" class="link-card" target="_blank">
                            <span class="icon">${icon}</span>
                            <div class="link-info">
                                <span class="link-title">${title}</span>
                                <span class="link-url">${url}</span>
                            </div>
                        </a>
                    `;
                    container.innerHTML += html;
                });
            })
            .catch(err => {
                document.getElementById("link-container").innerHTML = "Error loading links.csv";
                console.error(err);
            });
        }
    </script>
</body>
</html>
