<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platon Ivanchenko</title>
    
    <link rel="icon" href="https://github.com/ivanchenkoplaton.png">

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        .header { margin-bottom: 20px; margin-top: 40px; }
        
        /* Updated Profile Image Style */
        .profile-img { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            border: 4px solid white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            object-fit: cover; 
            background-color: white;
        }

        /* Search & Filter Styles */
        .controls { margin-bottom: 20px; }
        #search-input {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 1rem; box-sizing: border-box; margin-bottom: 10px;
        }
        .filter-btn {
            background: #fff; border: 1px solid #ddd; padding: 6px 12px; 
            border-radius: 20px; cursor: pointer; font-size: 0.9rem; margin: 2px;
            transition: 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { background: #007bff; color: white; border-color: #007bff; }

        /* Link Cards */
        .link-card { 
            background: white; color: #333; text-decoration: none; 
            padding: 15px 20px; margin-bottom: 12px; border-radius: 10px; 
            display: flex; align-items: center; text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; border-left: 5px solid transparent;
        }
        .link-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-left: 5px solid #007bff; }
        
        .icon { font-size: 1.5rem; margin-right: 15px; width: 30px; text-align: center; }
        .link-info { display: flex; flex-direction: column; overflow: hidden; }
        .link-title { font-weight: 600; font-size: 1rem; }
        .link-url { font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .type-file { border-left-color: #28a745; } 
        .type-video { border-left-color: #dc3545; } 
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://github.com/plat0802.png" alt="Platon Ivanchenko" class="profile-img">
            <h2>Platon Ivanchenko</h2>
        </div>

        <div class="controls">
            <input type="text" id="search-input" placeholder="🔍 Search links...">
            <div>
                <button class="filter-btn active" onclick="filterLinks('all', this)">All</button>
                <button class="filter-btn" onclick="filterLinks('web', this)">Web</button>
                <button class="filter-btn" onclick="filterLinks('file', this)">Files</button>
                <button class="filter-btn" onclick="filterLinks('video', this)">Videos</button>
            </div>
        </div>

        <div id="link-container">Loading...</div>
    </div>

    <script>
        let allLinks = [];

        fetch('./links.csv?t=' + new Date().getTime())
        .then(response => response.text())
        .then(csvText => {
            const rows = csvText.trim().split('\n');
            const container = document.getElementById("link-container");
            container.innerHTML = ""; 
            
            rows.forEach((row, index) => {
                if (index === 0 || !row.trim()) return; 

                const cols = row.split(',');
                const title = cols[0].trim();
                const url = cols[1].trim();
                const type = cols[2] ? cols[2].trim().toLowerCase() : "web";

                allLinks.push({ title, url, type });
            });

            renderLinks(allLinks);
        });

        function renderLinks(links) {
            const container = document.getElementById("link-container");
            container.innerHTML = ""; 
            
            links.forEach(link => {
                let icon = "🔗";
                let extraClass = "";

                if(link.type === 'file') { icon = "📂"; extraClass = "type-file"; }
                if(link.type === 'video') { icon = "🎬"; extraClass = "type-video"; }

                const html = `
                    <a href="${link.url}" class="link-card ${extraClass}" target="_blank">
                        <span class="icon">${icon}</span>
                        <div class="link-info">
                            <span class="link-title">${link.title}</span>
                            <span class="link-url">${link.url}</span>
                        </div>
                    </a>
                `;
                container.innerHTML += html;
            });
        }

        // Search Function
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allLinks.filter(link => 
                link.title.toLowerCase().includes(term) || link.url.toLowerCase().includes(term)
            );
            renderLinks(filtered);
        });

        // Category Filter Function
        function filterLinks(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (type === 'all') {
                renderLinks(allLinks);
            } else {
                const filtered = allLinks.filter(link => link.type === type);
                renderLinks(filtered);
            }
        }
    </script>
</body>
</html>
