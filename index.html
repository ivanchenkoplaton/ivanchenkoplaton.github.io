<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platon Ivanchenko | Terminal</title>
    
    <link rel="icon" href="https://github.com/plat0802.png">

    <style>
        /* Dark Hacker Theme */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: #0a0a0a; 
            color: #00ff41; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .container { width: 100%; max-width: 500px; text-align: center; }
        .header { margin-bottom: 30px; margin-top: 40px; }
        
        .profile-img { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            border: 2px solid #00ff41; 
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            object-fit: cover; 
            background-color: #000;
        }

        h2 { text-transform: uppercase; letter-spacing: 2px; }

        .controls { margin-bottom: 30px; }
        #search-input {
            width: 100%; padding: 12px; 
            background: #000; 
            border: 1px solid #00ff41; 
            color: #00ff41;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 1rem; box-sizing: border-box; margin-bottom: 15px;
            outline: none;
        }
        #search-input::placeholder { color: rgba(0, 255, 65, 0.5); }

        .filter-btn {
            background: #000; border: 1px solid #00ff41; padding: 6px 15px; 
            color: #00ff41; border-radius: 0; cursor: pointer; font-size: 0.8rem; 
            margin: 2px; transition: 0.3s; font-family: 'Courier New', monospace;
        }
        .filter-btn:hover, .filter-btn.active { 
            background: #00ff41; color: #000; box-shadow: 0 0 10px #00ff41; 
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            background-color: #000;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #00ff41;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 0 20px #00ff41;
            text-align: left;
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 10px; margin: 10px 0;
            background: #000; border: 1px solid #00ff41; color: #00ff41;
            font-family: 'Courier New', monospace; box-sizing: border-box;
        }

        /* Link Cards */
        .link-card { 
            background: #000; color: #00ff41; text-decoration: none; 
            padding: 15px 20px; margin-bottom: 15px; border: 1px solid #333; 
            display: flex; align-items: center; text-align: left;
            transition: 0.3s; border-left: 4px solid #00ff41;
        }
        .link-card:hover { transform: scale(1.02); border-color: #00ff41; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        
        .icon { font-size: 1.5rem; margin-right: 15px; width: 30px; text-align: center; }
        .link-info { display: flex; flex-direction: column; overflow: hidden; }
        .link-title { font-weight: 600; font-size: 1rem; }
        .link-url { font-size: 0.75rem; color: #008f11; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .type-file { border-left-color: #28a745; } 
        .type-video { border-left-color: #dc3545; } 
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="https://github.com/plat0802.png" alt="Platon Ivanchenko" class="profile-img">
            <h2>> Platon Ivanchenko</h2>
        </div>

        <div class="controls">
            <input type="text" id="search-input" placeholder="[QUERY_SYSTEM]: Search links...">
            <div>
                <button class="filter-btn active" onclick="filterLinks('all', this)">ALL_LOGS</button>
                <button class="filter-btn" onclick="filterLinks('web', this)">WEB</button>
                <button class="filter-btn" onclick="filterLinks('file', this)">FILES</button>
                <button class="filter-btn" onclick="filterLinks('video', this)">VIDEOS</button>
                <button class="filter-btn" style="border-color: #00ff41; color: #fff;" onclick="openModal()">+ NEW_LOG</button>
            </div>
        </div>

        <div id="link-container">Initializing system...</div>
    </div>

    <div id="entryModal" class="modal">
        <div class="modal-content">
            <h3>[UPLOAD_NEW_LOG]</h3>
            <input type="text" id="new-title" placeholder="Title">
            <input type="text" id="new-url" placeholder="URL">
            <select id="new-type">
                <option value="web">WEB</option>
                <option value="file">FILE</option>
                <option value="video">VIDEO</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <button class="filter-btn" onclick="submitToGithub()">AUTO_DEPLOY</button>
                <button class="filter-btn" onclick="closeModal()">CANCEL</button>
            </div>
            <p style="font-size: 0.7rem; color: #008f11; margin-top: 10px;">* Will redirect to GitHub to confirm the commit.</p>
        </div>
    </div>

    <script>
        let allLinks = [];

        fetch('./links.csv?t=' + new Date().getTime())
        .then(response => response.text())
        .then(csvText => {
            const rows = csvText.trim().split('\n');
            allLinks = [];
            rows.forEach((row, index) => {
                if (index === 0 || !row.trim()) return; 
                const cols = row.split(',');
                allLinks.push({ title: cols[0].trim(), url: cols[1].trim(), type: cols[2]?.trim().toLowerCase() || "web" });
            });
            renderLinks(allLinks);
        });

        function renderLinks(links) {
            const container = document.getElementById("link-container");
            container.innerHTML = ""; 
            links.forEach(link => {
                let icon = "🌐";
                let extraClass = link.type === 'file' ? "type-file" : (link.type === 'video' ? "type-video" : "");
                if(link.type === 'file') icon = "📁";
                if(link.type === 'video') icon = "🎬";

                container.innerHTML += `
                    <a href="${link.url}" class="link-card ${extraClass}" target="_blank">
                        <span class="icon">${icon}</span>
                        <div class="link-info">
                            <span class="link-title">${link.title}</span>
                            <span class="link-url">${link.url}</span>
                        </div>
                    </a>`;
            });
        }

        function filterLinks(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderLinks(type === 'all' ? allLinks : allLinks.filter(l => l.type === type));
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderLinks(allLinks.filter(l => l.title.toLowerCase().includes(term) || l.url.toLowerCase().includes(term)));
        });

        // Automation Logic
        function openModal() { document.getElementById("entryModal").style.display = "block"; }
        function closeModal() { document.getElementById("entryModal").style.display = "none"; }

        function submitToGithub() {
            const title = document.getElementById("new-title").value;
            const url = document.getElementById("new-url").value;
            const type = document.getElementById("new-type").value;

            if (!title || !url) return alert("System requires full data.");

            const repoUrl = "https://github.com/ivanchenkoplaton/ivanchenkoplaton.github.io/issues/new";
            const issueTitle = `Add: ${title}`;
            const issueBody = `${title},${url},${type}`; // This matches the CSV format
            const labels = "new-link";

            const finalUrl = `${repoUrl}?title=${encodeURIComponent(issueTitle)}&body=${encodeURIComponent(issueBody)}&labels=${labels}`;
            
            window.open(finalUrl, '_blank');
            closeModal();
        }

        window.onclick = (e) => { if (e.target == document.getElementById("entryModal")) closeModal(); }
    </script>
</body>
</html>
