<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Calendar | Terminal</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff41;
            --border-color: #333;
            --hover-shadow: rgba(0, 255, 65, 0.2);
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color); 
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .terminal-header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .terminal-header p { margin: 5px 0; }

        .calendar-container {
            border: 1px solid var(--text-color);
            box-shadow: 0 0 20px var(--hover-shadow);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            width: 100%;
            max-width: 800px;
        }

        iframe {
            max-width: 100%;
            width: 100%;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2); 
            display: block;
        }

        .back-link {
            margin-top: 25px;
            color: var(--text-color);
            text-decoration: none;
            border: 1px solid var(--text-color);
            padding: 10px 20px;
            transition: all 0.3s;
            border-radius: 4px;
        }

        .back-link:hover {
            background: var(--text-color);
            color: #000;
            box-shadow: 0 0 15px var(--text-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="terminal-header">
        <p>> access_directory: /root/calendar</p>
        <p>> status: online</p>
    </div>

    <div class="calendar-container">
        <iframe src="https://calendar.google.com/calendar/embed?src=417404f2da7f13170de53ff8798e142f8a49c68c197430fd6df1a290656a64a1%40group.calendar.google.com&ctz=Europe%2FBerlin&mode=WEEK&wkst=2" 
                style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
    </div>

    <a href="index.html" class="back-link">RETURN TO TERMINAL</a>
</body>
</html>
